version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tictactoe_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tictactoe}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-tictactoe}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./Server/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "${PG_PORT:-5432}:5432"

volumes:
  db-data:
    name: tictactoe_db_data
